<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide SOA - Cải tiến</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS MINI - CHỈ CẦN NÀY ĐỂ CHẠY NGAY */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            color: white; 
            overflow: hidden; 
            height: 100vh;
        }
        
        .slide-container {
            position: relative; width: 100vw; height: 100vh;
        }
        
        .slide {
            position: absolute; width: 100%; height: 100%;
            opacity: 0; transform: translateX(100%);
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            padding: 4rem; display: flex; align-items: center;
            justify-content: center;
        }
        
        .slide.active {
            opacity: 1; transform: translateX(0);
        }
        
        .slide-content {
            max-width: 1200px; width: 100%; font-size: 1.8rem;
        }
        
        .slide-content h1, .slide-content h2 {
            font-size: 4rem; text-align: center; margin-bottom: 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        .slide-content h3 { font-size: 2.5rem; margin: 1.5rem 0; }
        .slide-content p, .slide-content li { 
            font-size: 1.6rem; line-height: 1.6; color: #a1a1aa;
        }
        
        .nav-dots {
            position: fixed; top: 50%; right: 3rem; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 1rem;
        }
        
        .nav-dot {
            width: 12px; height: 12px; border-radius: 50%;
            background: rgba(255,255,255,0.3); cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .nav-dot:hover, .nav-dot.active {
            background: #667eea; transform: scale(1.5);
        }
        
        .nav-arrow {
            position: fixed; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.2); border: none;
            width: 50px; height: 50px; border-radius: 50%;
            color: white; font-size: 1.5rem; cursor: pointer;
            backdrop-filter: blur(20px);
        }
        
        .prev { left: 3rem; }
        .next { right: 3rem; }
        
        .progress-bar {
            position: fixed; bottom: 2rem; left: 50%;
            transform: translateX(-50%); width: 300px; height: 4px;
            background: rgba(255,255,255,0.2); border-radius: 2px;
        }
        
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #667eea, #764ba2);
            width: 20%; transition: width 0.8s ease; border-radius: 2px;
        }
        
        ul { list-style: none; }
        li { margin: 1rem 0; font-size: 1.6rem; }
        
        @media (max-width: 768px) {
            .slide { padding: 2rem; }
            .slide-content h1, .slide-content h2 { font-size: 2.5rem; }
            .slide-content p, li { font-size: 1.3rem; }
            .nav-dots { display: none; }
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <!-- 👇 THÊM SỐ DOT = SỐ SLIDE CỦA BẠN -->
        <div class="nav-dots" id="navDots"></div>

        <!-- SLIDE 1 -->
        <div class="slide active">
            <div class="slide-content">
                <!-- COPY NỘI DUNG SLIDE 1 GỐC VÀO ĐÂY -->
                <h1>Service-Oriented Architecture</h1>
                <p>Kiến trúc hướng dịch vụ hiện đại</p>
            </div>
        </div>

        <!-- SLIDE 2 -->
        <div class="slide">
            <div class="slide-content">
                <!-- COPY NỘI DUNG SLIDE 2 GỐC -->
                <h2>SOA là gì?</h2>
                <ul>
                    <li>🎯 Kiến trúc hướng dịch vụ</li>
                    <li>🔗 Giao tiếp qua chuẩn</li>
                    <li>⚙️ Loose Coupling</li>
                </ul>
            </div>
        </div>

        <!-- 👇 THÊM TẤT CẢ SLIDE KHÁC CỦA BẠN -->
        <!-- <div class="slide"> ... </div> -->
    </div>

    <!-- Navigation -->
    <button class="nav-arrow prev" onclick="changeSlide(-1)"><i class="fas fa-chevron-left"></i></button>
    <button class="nav-arrow next" onclick="changeSlide(1)"><i class="fas fa-chevron-right"></i></button>
    <div class="progress-bar"><div class="progress-fill"></div></div>

    <script>
        let currentSlideIndex = 1;
        let totalSlides = document.querySelectorAll('.slide').length;
        
        // Tạo dots tự động
        const navDots = document.getElementById('navDots');
        for(let i = 1; i <= totalSlides; i++) {
            const dot = document.createElement('span');
            dot.className = 'nav-dot';
            dot.onclick = () => currentSlide(i);
            navDots.appendChild(dot);
        }
        document.querySelector('.nav-dot').classList.add('active');
        
        function changeSlide(direction) {
            const slides = document.querySelectorAll('.slide');
            slides[currentSlideIndex-1].classList.remove('active');
            
            currentSlideIndex += direction;
            if(currentSlideIndex > totalSlides) currentSlideIndex = 1;
            if(currentSlideIndex < 1) currentSlideIndex = totalSlides;
            
            slides[currentSlideIndex-1].classList.add('active');
            updateDots();
            updateProgress();
        }
        
        function currentSlide(n) {
            document.querySelectorAll('.slide')[currentSlideIndex-1].classList.remove('active');
            currentSlideIndex = n;
            document.querySelectorAll('.slide')[currentSlideIndex-1].classList.add('active');
            updateDots();
            updateProgress();
        }
        
        function updateDots() {
            document.querySelectorAll('.nav-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i+1 === currentSlideIndex);
            });
        }
        
        function updateProgress() {
            document.querySelector('.progress-fill').style.width = 
                (currentSlideIndex/totalSlides)*100 + '%';
        }
        
        // Keyboard
        document.addEventListener('keydown', e => {
            if(e.key === 'ArrowLeft') changeSlide(-1);
            if(e.key === 'ArrowRight') changeSlide(1);
        });
    </script>
</body>
</html>
